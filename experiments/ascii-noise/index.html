<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ASCII Noise Field · Kalvis K. Kolesnikovs</title>
<meta name="description" content="An animated flow field rendered as ASCII chevrons over a value-noise mask. A standalone single file experiment by Kalvis." />
<meta name="theme-color" content="#0b0b0c" />
<link rel="canonical" href="https://www.kalvisan.lv/experiments/ascii-noise/" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #0b0b0c;
    --fg: #eae6dd;
    --muted: #9b978c;
    --accent: #8fd17a;
    --mono: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--mono);
    overflow: hidden;
  }
  canvas#field { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; }

  .ui { position: fixed; z-index: 2; pointer-events: none; }
  .top {
    top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: clamp(16px, 3vw, 28px) clamp(18px, 4vw, 40px);
    font-size: 0.8rem;
  }
  .top a { pointer-events: auto; color: var(--muted); text-decoration: none; }
  .top a:hover { color: var(--fg); }
  .top .title { color: var(--fg); letter-spacing: 0.02em; }

  .caption {
    left: 0; right: 0; bottom: 0;
    padding: clamp(18px, 4vw, 40px);
    max-width: 60ch;
    font-size: 0.82rem;
    line-height: 1.6;
    color: var(--muted);
  }
  .caption b { color: var(--fg); font-weight: 500; }
  .caption .hint { color: var(--accent); }

  :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  @media (prefers-reduced-motion: reduce) {
    .caption .hint::after { content: " (motion reduced)"; color: var(--muted); }
  }
</style>
</head>
<body>
<canvas id="field" aria-label="Animated ASCII noise field"></canvas>

<div class="ui top">
  <a href="/">&larr; Kalvis</a>
  <span class="title">ASCII Noise Field</span>
</div>

<div class="ui caption">
  <b>ASCII Noise Field.</b> A 3D value-noise field drives a grid of chevrons.
  Where the noise crosses a threshold a character appears, the rim dithers out with
  round marks, and a second noise field sets each chevron's direction.
  <span class="hint">Move the pointer to nudge it.</span>
</div>

<script>
/* Standalone ASCII noise field. Plain canvas, no dependencies.
   Throttled to about 20 fps, empty cells skipped, static frame on reduced motion. */
(function () {
  const canvas = document.getElementById("field");
  const ctx = canvas.getContext("2d", { alpha: false });
  const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  const CELL = 16;
  const FPS = 20;
  const FRAME = 1000 / FPS;
  const THRESHOLD = 0.54;
  const EDGE = 0.05;
  const JITTER = 0.04;
  const OCTAVES = 3;
  const NOISE_SCALE = 0.05;
  const FLOW_SCALE = 0.03;
  const DRIFT = 0.2;
  const TIME_SPEED = 0.12;
  const PARALLAX = 26;

  const CHEV = [">", "/", "^", "\\", "<", "/", "v", "\\"];
  const RIM = ["·", "°", "o", "0"];

  function buildNoise(seed) {
    const perm = new Uint8Array(512);
    const base = new Uint8Array(256);
    for (let i = 0; i < 256; i++) base[i] = i;
    let s = seed >>> 0;
    function rand() {
      s = (s + 0x6D2B79F5) | 0;
      let t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    }
    for (let i = 255; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      const tmp = base[i]; base[i] = base[j]; base[j] = tmp;
    }
    for (let i = 0; i < 512; i++) perm[i] = base[i & 255];
    function h(xi, yi, zi) {
      return perm[(perm[(perm[xi & 255] + yi) & 255] + zi) & 255] / 255;
    }
    function sm(t) { return t * t * (3 - 2 * t); }
    function lerp(a, b, t) { return a + (b - a) * t; }
    return function (x, y, z) {
      const xi = Math.floor(x), yi = Math.floor(y), zi = Math.floor(z);
      const xf = x - xi, yf = y - yi, zf = z - zi;
      const u = sm(xf), v = sm(yf), w = sm(zf);
      const c000 = h(xi, yi, zi), c100 = h(xi + 1, yi, zi);
      const c010 = h(xi, yi + 1, zi), c110 = h(xi + 1, yi + 1, zi);
      const c001 = h(xi, yi, zi + 1), c101 = h(xi + 1, yi, zi + 1);
      const c011 = h(xi, yi + 1, zi + 1), c111 = h(xi + 1, yi + 1, zi + 1);
      const x00 = lerp(c000, c100, u), x10 = lerp(c010, c110, u);
      const x01 = lerp(c001, c101, u), x11 = lerp(c011, c111, u);
      return lerp(lerp(x00, x10, v), lerp(x01, x11, v), w);
    };
  }

  const noise = buildNoise(7331);
  function fbm(x, y, z) {
    let amp = 0.5, freq = 1, sum = 0, norm = 0;
    for (let i = 0; i < OCTAVES; i++) {
      sum += amp * noise(x * freq, y * freq, z * freq);
      norm += amp; amp *= 0.5; freq *= 2;
    }
    return sum / norm;
  }
  function cellHash(i, j) {
    let n = (i * 374761393 + j * 668265263) | 0;
    n = (n ^ (n >>> 13)) * 1274126177;
    n ^= n >>> 16;
    return ((n >>> 0) / 4294967296);
  }

  let dpr = 1, cols = 0, rows = 0, W = 0, H = 0, pointerX = 0.5, pointerY = 0.5;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 1.5);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.font = (CELL - 2) + "px " + "ui-monospace, monospace";
    ctx.textBaseline = "middle";
    ctx.textAlign = "center";
    cols = Math.ceil(W / CELL) + 1;
    rows = Math.ceil(H / CELL) + 1;
  }

  function draw(elapsed) {
    ctx.fillStyle = "#0b0b0c";
    ctx.fillRect(0, 0, W, H);
    const driftX = elapsed * DRIFT;
    const z = elapsed * TIME_SPEED;
    const px = (pointerX - 0.5) * PARALLAX / CELL;
    const py = (pointerY - 0.5) * PARALLAX / CELL;
    for (let j = 0; j < rows; j++) {
      for (let i = 0; i < cols; i++) {
        const n = fbm((i + driftX + px) * NOISE_SCALE, (j + py) * NOISE_SCALE, z);
        const thr = THRESHOLD + (cellHash(i, j) - 0.5) * 2 * JITTER;
        if (n < thr) continue;
        const depth = n - thr;
        let ch, alpha;
        if (depth < EDGE) {
          ch = RIM[Math.floor(cellHash(i + 7, j + 3) * RIM.length) % RIM.length];
          alpha = 0.12 + (depth / EDGE) * 0.2;
        } else {
          const a = fbm((i + driftX) * FLOW_SCALE + 50, j * FLOW_SCALE + 50, z * 0.6);
          ch = CHEV[(Math.round(a * 8) % 8 + 8) % 8];
          alpha = 0.4 + Math.min(depth * 2.4, 0.55);
        }
        ctx.fillStyle = "rgba(143, 209, 122, " + alpha.toFixed(3) + ")";
        ctx.fillText(ch, i * CELL + CELL / 2, j * CELL + CELL / 2);
      }
    }
  }

  let last = 0, startStamp = null, raf = null;
  function loop(ts) {
    if (startStamp === null) startStamp = ts;
    if (ts - last >= FRAME) { last = ts; draw((ts - startStamp) / 1000); }
    raf = requestAnimationFrame(loop);
  }

  resize();
  if (reduce) {
    draw(14);
  } else {
    window.addEventListener("pointermove", function (e) {
      pointerX = e.clientX / W; pointerY = e.clientY / H;
    }, { passive: true });
    document.addEventListener("visibilitychange", function () {
      if (document.hidden) { if (raf) { cancelAnimationFrame(raf); raf = null; } }
      else if (!raf) { last = 0; raf = requestAnimationFrame(loop); }
    });
    raf = requestAnimationFrame(loop);
  }
  let rt = null;
  window.addEventListener("resize", function () {
    clearTimeout(rt);
    rt = setTimeout(function () { resize(); if (reduce) draw(14); }, 150);
  });
})();
</script>
</body>
</html>
